services:
  # ── Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safevision
      POSTGRES_USER: safevision
      POSTGRES_PASSWORD: safevision
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safevision"]
      interval: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://safevision:safevision@db:5432/safevision
      DATABASE_URL_SYNC: postgresql://safevision:safevision@db:5432/safevision
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── AI Inference Service ──────────────────────────────────────────
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      - api
      - redis
    volumes:
      - ./ai_service:/app
      - ai_models:/app/models

  # ── Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  ai_models:
