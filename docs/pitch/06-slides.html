<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>AgroMind — Adria Future Hackathon 2026</title>
  <style>
    :root {
      --ink: #E8F3EE;
      --bg: #0B1612;
      --surface: #132420;
      --surface-hi: #1B332C;
      --green: #2FB682;
      --green-deep: #1E7A58;
      --amber: #F2B94B;
      --red: #E5483A;
      --sky: #6FB8F2;
      --muted: #93A7A0;
      --hairline: #203830;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-feature-settings: 'ss01', 'cv11'; }
    body { overflow: hidden; font-variant-numeric: tabular-nums; }
    .stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide {
      position: absolute;
      top: 50%; left: 50%;
      width: min(1600px, 96vw);
      aspect-ratio: 16 / 9;
      transform: translate(-50%, -50%) scale(0.98);
      opacity: 0;
      padding: 80px 96px;
      pointer-events: none;
      transition: opacity 180ms ease, transform 220ms ease;
      display: flex;
      flex-direction: column;
    }
    .slide.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
    .slide h1 { font-weight: 700; font-size: 96px; letter-spacing: -0.02em; line-height: 1.02; }
    .slide h2 { font-weight: 700; font-size: 72px; letter-spacing: -0.015em; line-height: 1.05; }
    .slide h3 { font-weight: 600; font-size: 40px; letter-spacing: -0.01em; line-height: 1.15; }
    .slide p { font-size: 28px; line-height: 1.45; color: var(--ink); max-width: 1100px; }
    .slide .muted { color: var(--muted); }
    .slide .green { color: var(--green); }
    .slide .red { color: var(--red); }
    .slide .amber { color: var(--amber); }
    .slide .sky { color: var(--sky); }
    .slide .tagline { font-size: 32px; color: var(--muted); margin-top: 24px; max-width: 1100px; }
    .hero-number { font-size: 220px; font-weight: 700; letter-spacing: -0.04em; line-height: 0.95; }
    .big-number { font-size: 140px; font-weight: 700; letter-spacing: -0.03em; line-height: 0.95; }
    .chip {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 18px; border: 1px solid var(--hairline); border-radius: 999px;
      font-size: 16px; color: var(--muted); background: rgba(255,255,255,0.02);
    }
    .chip.green { color: var(--green); border-color: rgba(47,182,130,0.3); }
    .chip.red { color: var(--red); border-color: rgba(229,72,58,0.3); }
    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 20px;
      padding: 28px;
    }
    .card.hi { background: var(--surface-hi); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: start; }
    .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .foot { position: absolute; left: 40px; right: 40px; bottom: 28px; display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 14px; }
    .foot .brand { letter-spacing: 0.04em; font-weight: 600; color: var(--ink); }
    .pager { position: fixed; right: 32px; bottom: 20px; color: var(--muted); font-size: 13px; letter-spacing: 0.12em; z-index: 10; }
    .progress { position: fixed; left: 0; right: 0; bottom: 0; height: 3px; background: transparent; z-index: 10; }
    .progress > div { height: 100%; background: var(--green); transition: width 220ms ease; }
    .list { display: grid; gap: 14px; }
    .list > li { list-style: none; padding: 16px 20px; border-left: 3px solid var(--green); background: var(--surface); border-radius: 0 14px 14px 0; font-size: 22px; }
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--hairline); font-size: 18px; vertical-align: top; }
    .tbl th { color: var(--muted); font-weight: 500; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
    .pill { display: inline-block; padding: 6px 12px; border-radius: 999px; background: rgba(47,182,130,0.12); color: var(--green); font-size: 14px; font-weight: 600; }
    kbd { background: var(--surface-hi); padding: 2px 8px; border-radius: 6px; font-size: 13px; color: var(--muted); border: 1px solid var(--hairline); }
    .title-slide {
      background: radial-gradient(1200px 700px at 70% 30%, rgba(47,182,130,0.18), transparent 60%),
                  radial-gradient(800px 500px at 20% 80%, rgba(111,184,242,0.10), transparent 60%);
    }
    .wordmark {
      font-size: 120px; font-weight: 800; letter-spacing: -0.03em; line-height: 1;
      background: linear-gradient(180deg, #ECFBF4 0%, #9FE3C1 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-bar { display: flex; gap: 32px; align-items: baseline; }
    .stat-bar > div { display: flex; flex-direction: column; gap: 4px; }
    .code {
      font-family: 'JetBrains Mono', Menlo, monospace;
      background: #0A1411; border: 1px solid var(--hairline); border-radius: 14px;
      padding: 18px 22px; color: #CDE8D9; font-size: 15px; line-height: 1.55;
      white-space: pre-wrap;
    }
    .phone {
      width: 320px; aspect-ratio: 9 / 19; border-radius: 40px; background: #0A1411;
      border: 2px solid var(--hairline); padding: 20px 14px; position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .phone .notch { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 100px; height: 24px; background: #000; border-radius: 999px; }
    .phone-card { background: var(--surface); border-radius: 14px; padding: 14px; margin-top: 14px; font-size: 13px; }
    .phone-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
    .phone-value { font-size: 22px; font-weight: 700; line-height: 1; }
    .phone-caption { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .connector { position: absolute; border-top: 1px solid rgba(47,182,130,0.4); border-right: 1px solid rgba(47,182,130,0.4); }
    .demo-word {
      font-size: 260px; font-weight: 800; color: var(--green); letter-spacing: -0.04em;
      text-align: center; animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .notice { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); color: var(--muted); font-size: 14px; letter-spacing: 0.06em; z-index: 9; }
    .notice kbd { margin: 0 4px; }
    .circle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; }
    .circles { position: relative; width: 560px; height: 480px; margin: 0 auto; }
    .circle { position: absolute; border-radius: 50%; border: 1px solid rgba(47,182,130,0.4); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px; }
    .circle .n { font-size: 46px; font-weight: 700; color: var(--ink); }
    .circle .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .circle.tam { width: 480px; height: 480px; left: 40px; top: 0; background: radial-gradient(circle at 50% 50%, rgba(47,182,130,0.09), transparent 70%); }
    .circle.sam { width: 340px; height: 340px; left: 110px; top: 70px; background: radial-gradient(circle at 50% 50%, rgba(47,182,130,0.15), transparent 70%); }
    .circle.som { width: 200px; height: 200px; left: 180px; top: 140px; background: radial-gradient(circle at 50% 50%, rgba(47,182,130,0.25), transparent 70%); }
    .timeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; align-items: start; margin-top: 20px; }
    .timeline .item { padding-top: 20px; position: relative; }
    .timeline .item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); border-radius: 3px; }
    .timeline .item.future::before { background: var(--hairline); }
    .timeline .month { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .timeline .text { font-size: 16px; margin-top: 6px; line-height: 1.3; }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="pager" id="pager">01 / 12</div>
  <div class="progress"><div id="bar" style="width: 8.3%"></div></div>
  <div class="notice">Advance with <kbd>→</kbd> or <kbd>Space</kbd> · Back with <kbd>←</kbd> · Fullscreen with <kbd>F</kbd></div>

  <template id="s-title">
    <div class="slide title-slide">
      <div style="margin-top:60px">

  <template id="s-problem">

      <div class="label">The problem</div>

        <div>
          <div class="hero-number red">200,000 t</div>

        </div>
        <div class="card">
          <div class="label green">EU capital</div>

        <div class="card">

      <div class="foot"><span class="brand">AgroMind</span><span>Why now</span></div>

      <div class="foot"><span class="brand">AgroMind</span><span>Solution</span></div>
    </div>

  <template id="s-demo">

        <div class="label">Live on the device now</div>

  <script>
    const ids = [
      's-title','s-problem','s-tailwinds','s-solution','s-demo',
      's-science','s-market','s-business','s-gtm','s-traction',
      's-team','s-ask'
    ];
    const stage = document.getElementById('stage');
    const pager = document.getElementById('pager');
    const bar = document.getElementById('bar');
    let idx = 0;
    function render() {
      stage.innerHTML = '';
      const tpl = document.getElementById(ids[idx]);
      const node = tpl.content.firstElementChild.cloneNode(true);
      node.classList.add('active');
      stage.appendChild(node);
      pager.textContent = String(idx + 1).padStart(2, '0') + ' / ' + String(ids.length).padStart(2, '0');
      bar.style.width = ((idx + 1) / ids.length * 100).toFixed(2) + '%';
    }
    function next() { if (idx < ids.length - 1) { idx++; render(); } }
    function prev() { if (idx > 0) { idx--; render(); } }
    function toggleFs() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
      if (e.key.toLowerCase() === 'f') { toggleFs(); }
      if (e.key === 'Home') { idx = 0; render(); }
      if (e.key === 'End') { idx = ids.length - 1; render(); }
    });
    window.addEventListener('click', () => next());
    render();
  </script>
